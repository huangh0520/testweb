<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>摸鱼日历 · 假期倒计时</title>
    <!-- 移除外部Google Fonts，使用纯系统字体，极大提升加载速度，无网络请求 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            /* 系统级字体栈，不依赖外部资源，渲染极快 */
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
            color: #ffffff;
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* 主容器布局 */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 返回链接 */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color 0.2s;
            cursor: default; /* 保持摸鱼氛围，无实际跳转 */
        }
        .back-link:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        /* 头部标题区 */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff6b6b, #ffa502);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        /* 双卡片信息 */
        .info-cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 140px;
        }
        .info-card .label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .info-card .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #10b981;
        }

        /* 倒计时主面板 */
        .countdown-panel {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(254, 202, 87, 0.1));
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 107, 107, 0.3);
            backdrop-filter: blur(2px);
        }
        .countdown-title {
            font-size: 2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
        }
        .countdown-digits {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .time-block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            min-width: 80px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .time-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff6b6b;
            line-height: 1.2;
        }
        .time-unit {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 6px;
        }
        .countdown-footnote {
            font-size: 1.1rem;
            color: #feca57;
            margin-top: 10px;
        }

        /* 假期列表标题 */
        .holiday-title {
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.4rem;
            font-weight: 500;
        }
        /* 假期网格 */
        .holiday-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .holiday-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        /* 劳动节特殊高亮（动态保留高亮氛围） */
        .holiday-card.labor-highlight {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), transparent);
            border: 1px solid #ff6b6b;
        }
        .holiday-emoji {
            font-size: 1.6rem;
        }
        .holiday-info {
            flex: 1;
        }
        .holiday-name {
            font-weight: 500;
            font-size: 1rem;
        }
        .holiday-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }
        .holiday-status {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-upcoming {
            color: #10b981;
        }
        .status-past {
            color: rgba(255, 255, 255, 0.4);
        }
        .status-today {
            color: #fbbf24;
        }

        /* 响应式微调 */
        @media (max-width: 550px) {
            body { padding: 20px 16px; }
            .time-block { padding: 10px 12px; min-width: 65px; }
            .time-number { font-size: 1.8rem; }
            .countdown-title { font-size: 1.6rem; }
            .info-card { padding: 15px 20px; }
            .holiday-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 返回首页风格链接（无实际跳转，保留氛围） -->
    <a href="http://526510.xyz/blog/" class="back-link">← 返回首页</a>

    <!-- 头部摸鱼区域 -->
    <div class="hero">
        <h1>
            🐟 
            <span class="gradient-text">摸鱼日历</span>
        </h1>
        <p>今天的工作做完了吗？没有就继续摸鱼吧！</p>
    </div>

    <!-- 日期与星期卡片 -->
    <div class="info-cards">
        <div class="info-card">
            <div class="label">今天</div>
            <div class="value" id="todayDate">2026年4月8日</div>
        </div>
        <div class="info-card">
            <div class="label">星期</div>
            <div class="value" id="todayWeek">星期三</div>
        </div>
    </div>

    <!-- 倒计时主面板 (劳动节专属) -->
    <div class="countdown-panel">
        <div class="countdown-title">
            <span>💪</span> 劳动节
        </div>
        <div class="countdown-digits">
            <div class="time-block">
                <div class="time-number" id="cdDays">22</div>
                <div class="time-unit">天</div>
            </div>
            <div class="time-block">
                <div class="time-number" id="cdHours">11</div>
                <div class="time-unit">时</div>
            </div>
            <div class="time-block">
                <div class="time-number" id="cdMinutes">35</div>
                <div class="time-unit">分</div>
            </div>
            <div class="time-block">
                <div class="time-number" id="cdSeconds">20</div>
                <div class="time-unit">秒</div>
            </div>
        </div>
        <div class="countdown-footnote" id="countdownMessage">还有22天，慢慢摸吧~</div>
    </div>

    <!-- 假期一览列表 -->
    <h3 class="holiday-title">📅 2026 年假期一览</h3>
    <div class="holiday-grid" id="holidayGrid">
        <!-- 假期卡片会由js动态生成，确保数据和状态实时更新 -->
    </div>
</div>

<script>
    // ---------- 假期数据 (2026年) ----------
    const holidaysData = [
        { name: "元旦", emoji: "🎊", dateStr: "2026-01-01", dateObj: new Date(2026, 0, 1) },
        { name: "春节", emoji: "🧧", dateStr: "2026-01-29", dateObj: new Date(2026, 0, 29) },
        { name: "清明节", emoji: "🌿", dateStr: "2026-04-05", dateObj: new Date(2026, 3, 5) },
        { name: "劳动节", emoji: "💪", dateStr: "2026-05-01", dateObj: new Date(2026, 4, 1) },
        { name: "端午节", emoji: "🐉", dateStr: "2026-05-31", dateObj: new Date(2026, 4, 31) },
        { name: "中秋节", emoji: "🥮", dateStr: "2026-09-25", dateObj: new Date(2026, 8, 25) },
        { name: "国庆节", emoji: "🇨🇳", dateStr: "2026-10-01", dateObj: new Date(2026, 9, 1) }
    ];

    // 辅助函数: 格式化数字补零
    function padZero(num) {
        return String(num).padStart(2, '0');
    }

    // 获取当前日期(本地) 返回 Date 对象 时间部分归零用于日期比较
    function getTodayDateObj() {
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    // 计算两个日期之间的天数差 (date2 - date1, 忽略时间)
    function getDaysDiff(date1, date2) {
        const d1 = new Date(date1.getFullYear(), date1.getMonth(), date1.getDate());
        const d2 = new Date(date2.getFullYear(), date2.getMonth(), date2.getDate());
        const diffTime = d2.getTime() - d1.getTime();
        return Math.round(diffTime / (1000 * 60 * 60 * 24));
    }

    // 获取当前实时时间对象（用于倒计时精确计算）
    function getCurrentMoment() {
        return new Date();
    }

    // 计算距离劳动节 (2026-05-01 00:00:00 本地时间) 剩余 天/时/分/秒, 以及状态
    function getLaborDayCountdown() {
        const laborDayTarget = new Date(2026, 4, 1, 0, 0, 0, 0);
        const now = getCurrentMoment();
        const diffMs = laborDayTarget.getTime() - now.getTime();
        let remaining = { days: 0, hours: 0, minutes: 0, seconds: 0, isExpired: false, totalDaysRemaining: 0 };
        if (diffMs <= 0) {
            remaining.isExpired = true;
            remaining.days = 0;
            remaining.hours = 0;
            remaining.minutes = 0;
            remaining.seconds = 0;
            remaining.totalDaysRemaining = 0;
        } else {
            const totalSeconds = Math.floor(diffMs / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            remaining.days = days;
            remaining.hours = hours;
            remaining.minutes = minutes;
            remaining.seconds = seconds;
            remaining.isExpired = false;
            // 按日期边界计算剩余天数（用于底部文案）
            const todayDateObj = getTodayDateObj();
            const laborDateOnly = new Date(2026, 4, 1);
            const daysUntil = getDaysDiff(todayDateObj, laborDateOnly);
            remaining.totalDaysRemaining = daysUntil >= 0 ? daysUntil : 0;
        }
        return remaining;
    }

    // 更新倒计时面板UI (劳动节) - 直接操作DOM，效率最高
    function updateCountdownPanel() {
        const cd = getLaborDayCountdown();
        document.getElementById('cdDays').innerText = cd.days;
        document.getElementById('cdHours').innerText = padZero(cd.hours);
        document.getElementById('cdMinutes').innerText = padZero(cd.minutes);
        document.getElementById('cdSeconds').innerText = padZero(cd.seconds);
        const msgEl = document.getElementById('countdownMessage');
        if (cd.isExpired) {
            msgEl.innerText = '🚫 劳动节已过，继续摸鱼等明年~';
        } else {
            const remainDays = cd.totalDaysRemaining;
            if (remainDays === 0) {
                msgEl.innerText = '🎉 劳动节快乐！今天放假啦！🎉';
            } else {
                msgEl.innerText = `还有 ${remainDays} 天，慢慢摸吧~`;
            }
        }
        // 若恰好当天0点但未过期时，额外细节保证一致性
        if (!cd.isExpired && cd.days === 0 && cd.hours === 0 && cd.minutes === 0 && cd.seconds === 0) {
            msgEl.innerText = '🎉 劳动节快乐！尽情放松！🎉';
        }
    }

    // 更新顶部日期与星期（轻量级）
    function updateHeaderDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const weekday = weekdays[now.getDay()];
        document.getElementById('todayDate').innerText = `${year}年${month}月${day}日`;
        document.getElementById('todayWeek').innerText = weekday;
    }

    // 为单个假期生成状态文本和class (用于动态渲染)
    function getHolidayStatus(holidayDateObj) {
        const todayDateObj = getTodayDateObj();
        const daysDiff = getDaysDiff(todayDateObj, holidayDateObj);
        if (daysDiff < 0) {
            return { text: "已过", className: "status-past" };
        } else if (daysDiff === 0) {
            return { text: "今天", className: "status-today" };
        } else {
            return { text: `${daysDiff}天`, className: "status-upcoming" };
        }
    }

    // 高效渲染假期列表：仅重建列表内容，避免全局复杂计算。由于卡片只有7个，性能无压力且保证同步
    function renderHolidayList() {
        const gridContainer = document.getElementById('holidayGrid');
        if (!gridContainer) return;
        let html = '';
        for (let i = 0; i < holidaysData.length; i++) {
            const h = holidaysData[i];
            const status = getHolidayStatus(h.dateObj);
            const isLaborDay = (h.name === '劳动节');
            const highlightClass = isLaborDay ? 'labor-highlight' : '';
            html += `
                <div class="holiday-card ${highlightClass}">
                    <div class="holiday-emoji">${h.emoji}</div>
                    <div class="holiday-info">
                        <div class="holiday-name">${h.name}</div>
                        <div class="holiday-date">${h.dateStr}</div>
                    </div>
                    <div class="holiday-status ${status.className}">${status.text}</div>
                </div>
            `;
        }
        gridContainer.innerHTML = html;
    }

    // 统一刷新所有动态模块（避免重复调用）
    function refreshAll() {
        updateHeaderDate();          // 日期&星期
        updateCountdownPanel();      // 劳动节倒计时天时分秒 + 文案
        renderHolidayList();         // 假期列表状态更新 (重绘轻量)
    }

    // 采用 requestAnimationFrame 配合 setInterval 节流优化：实际上每秒一次足够了，而且不会造成布局抖动
    let timer = null;
    function startOptimizedTimer() {
        if (timer) clearInterval(timer);
        // 立即执行一次让数据马上显示
        refreshAll();
        // 设置每秒更新一次，保证倒计时流畅且性能友好
        timer = setInterval(() => {
            refreshAll();
        }, 1000);
    }

    // 页面启动
    startOptimizedTimer();

    // 可选：页面可见性变化时保持定时器正常，不额外消耗
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            // 重新同步一次确保显示正确
            refreshAll();
        }
    });

    // 确保所有DOM元素加载完成时无误差（脚本在body底部执行，已经确保存在）
    window.addEventListener('load', function() {
        refreshAll();
    });
</script>
</body>
</html>
